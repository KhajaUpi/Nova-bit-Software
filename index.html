<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Nova Bit | Premium Minimalist Software</title>
    <script type="module" crossorigin src="./assets/index-Cg--jVwK.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BV-5L1pb.css">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <style>
      #firebase-auth-overlay {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        font-family: 'Inter', sans-serif;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 12px 20px;
        border-radius: 12px;
        color: #fff;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      .auth-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .auth-btn:hover { opacity: 0.9; }
      .hidden { display: none !important; }
      .user-profile { display: flex; align-items: center; gap: 10px; }
      .user-profile img { width: 32px; height: 32px; border-radius: 50%; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="firebase-auth-overlay">
      <div id="logged-out-view">
        <button id="login-btn" class="auth-btn">Log In</button>
      </div>
      <div id="logged-in-view" class="hidden user-profile">
        <img id="user-avatar" src="" alt="Avatar">
        <span id="user-name"></span>
        <button id="logout-btn" class="auth-btn" style="background: transparent; color: #ff4a4a; margin-left: 10px;">Log Out</button>
      </div>
    </div>

    <script>
      const modifyPageContent = () => {
        // 1. Change Heading from Zenith to Nebula
        const headings = document.querySelectorAll('h1, h2, h3, h4');
        headings.forEach(heading => {
          if (heading.textContent.includes('Zenith Screensaver')) {
            heading.textContent = 'Nebula Screensaver';
          }
        });

        // 2. Find and update the "Download Project" button actions and text
        const buttons = document.querySelectorAll('button, a');
        buttons.forEach(btn => {
          if (btn.textContent.trim().toLowerCase().includes('download project')) {
            // Transform button to direct anchor link styling
            btn.innerHTML = 'Download Nebula Screensaver <span style="font-weight: 300; opacity: 0.8; font-size: 0.85em; margin-left: 4px;">(Made by Afnaan)</span>';
            
            // If it's an anchor element tag, update the href link
            if (btn.tagName.toLowerCase() === 'a') {
              btn.setAttribute('href', 'https://docs.google.com/uc?export=download&id=1xLFHCecaNFgbKe9D_P91-05VBO4BSNxP');
            } else {
              // If it's a regular button tag, add a click action to trigger download window
              btn.onclick = () => {
                window.location.href = 'https://docs.google.com/uc?export=download&id=1xLFHCecaNFgbKe9D_P91-05VBO4BSNxP';
              };
            }
          }
        });
      };

      // Watch your React root container for updates to instantly apply modifications
      const observer = new MutationObserver(() => {
        modifyPageContent();
      });

      const rootNode = document.getElementById('root');
      if (rootNode) {
        observer.observe(rootNode, { childList: true, subtree: true });
      }
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, signInWithRedirect, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

      // Your live Nova Bit Firebase configurations
      const firebaseConfig = {
        apiKey: "AIzaSyBOO6ct3E2lA2UT2o6R1amKsZ9wpyiDZ-0",
        authDomain: "nova-bit-software.firebaseapp.com",
        projectId: "nova-bit-software",
        storageBucket: "nova-bit-software.firebasestorage.app",
        messagingSenderId: "60232912998",
        appId: "1:60232912998:web:d777b3d9787b88c1195da7",
        measurementId: "G-37T42XL9KW"
      };

      // Initialize Firebase & Services
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const analytics = getAnalytics(app);
      const provider = new GoogleAuthProvider();

      // DOM Elements
      const loggedOutView = document.getElementById('logged-out-view');
      const loggedInView = document.getElementById('logged-in-view');
      const loginBtn = document.getElementById('login-btn');
      const logoutBtn = document.getElementById('logout-btn');
      const userAvatar = document.getElementById('user-avatar');
      const userName = document.getElementById('user-name');

      // Login handler
      loginBtn.addEventListener('click', () => {
        signInWithRedirect(auth, provider).catch(err => {
          console.error("Login error: ", err);
        });
      });

      // Logout handler
      logoutBtn.addEventListener('click', () => {
        signOut(auth).catch(err => {
          console.error("Logout error: ", err);
        });
      });

      // State Observer
      onAuthStateChanged(auth, (user) => {
        if (user) {
          loggedOutView.classList.add('hidden');
          loggedInView.classList.remove('hidden');
          userAvatar.src = user.photoURL || '';
          userName.textContent = user.displayName || 'User';
        } else {
          loggedOutView.classList.remove('hidden');
          loggedInView.classList.add('hidden');
        }
      });
    </script>
  </body>
</html>
